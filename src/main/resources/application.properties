spring.application.name=labflowapi
spring.jpa.hibernate.dll-auto=update
spring.h2.console.enabled=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.session.jdbc.initialize-schema=always
spring.sql.init.mode=always
# Jackson 3 (Spring Boot 4) cambio FAIL_ON_NULL_FOR_PRIMITIVES a true: mapear un
# null del body en un campo primitivo (long/int/boolean) lanza 400. Se restaura
# el comportamiento previo (null -> valor por defecto) para no romper DTOs con
# campos primitivos que el cliente pueda enviar como null.
spring.jackson.deserialization.fail-on-null-for-primitives=false
# JWT
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=86400000

# Correo por el API HTTP de Resend (https://resend.com), no SMTP: las plataformas
# tipo Railway bloquean los puertos SMTP salientes, el API va por HTTPS (443).
app.resend.apiKey=${RESEND_API_KEY:}

# Invitaciones de usuario. El remitente debe ser de un dominio verificado en Resend.
app.mailFrom=${MAIL_FROM:no-reply@labflow.app}
app.frontendBaseUrl=${FRONTEND_BASE_URL:http://localhost:3000}
app.invitationExpirationHours=${INVITATION_EXPIRATION_HOURS:72}
